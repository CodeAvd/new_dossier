<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale — 4px base" subtitle="--space-1 … --space-9" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-base); padding: 24px; font-family: var(--font-mono); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--terra-300); border-radius: var(--radius-xs); width: 26px; }
  .n { font-size: 10px; color: var(--text-strong); font-weight: 600; }
  .px { font-size: 9px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="height:4px"></div><div class="n">1</div><div class="px">4</div></div>
    <div class="col"><div class="bar" style="height:8px"></div><div class="n">2</div><div class="px">8</div></div>
    <div class="col"><div class="bar" style="height:12px"></div><div class="n">3</div><div class="px">12</div></div>
    <div class="col"><div class="bar" style="height:16px"></div><div class="n">4</div><div class="px">16</div></div>
    <div class="col"><div class="bar" style="height:24px"></div><div class="n">5</div><div class="px">24</div></div>
    <div class="col"><div class="bar" style="height:32px"></div><div class="n">6</div><div class="px">32</div></div>
    <div class="col"><div class="bar" style="height:40px"></div><div class="n">7</div><div class="px">40</div></div>
    <div class="col"><div class="bar" style="height:48px"></div><div class="n">8</div><div class="px">48</div></div>
    <div class="col"><div class="bar" style="height:64px"></div><div class="n">9</div><div class="px">64</div></div>
  </div>
</body>
</html>
