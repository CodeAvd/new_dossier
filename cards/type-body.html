<!-- @dsCard group="Type" viewport="700x230" name="Body — Hanken Grotesk" subtitle="humanist sans for reading text" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-base); padding: 26px; font-family: var(--font-sans); }
  .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px; }
  .lead { font-size: 19px; line-height: 1.55; color: var(--text-strong); font-weight: 500; max-width: 600px; }
  .para { font-size: 16px; line-height: 1.62; color: var(--text-body); max-width: 600px; margin-top: 10px; }
  .weights { display: flex; gap: 26px; margin-top: 20px; align-items: baseline; }
  .weights span { font-size: 26px; color: var(--text-strong); }
  .wt { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); display: block; }
</style>
</head>
<body>
  <div class="eyebrow">hanken grotesk · body</div>
  <p class="lead">file-first. evidence-backed. claims that prove themselves.</p>
  <p class="para">qa brain, builder hands. i ship tools that back their own verdicts — agents that cite the source, traders that show the edge.</p>
  <div class="weights">
    <div><span style="font-weight:400">Aa</span><span class="wt">regular 400</span></div>
    <div><span style="font-weight:500">Aa</span><span class="wt">medium 500</span></div>
    <div><span style="font-weight:600">Aa</span><span class="wt">semibold 600</span></div>
    <div><span style="font-weight:700">Aa</span><span class="wt">bold 700</span></div>
    <div><span style="font-weight:800">Aa</span><span class="wt">extra 800</span></div>
  </div>
</body>
</html>
