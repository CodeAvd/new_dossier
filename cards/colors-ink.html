<!-- @dsCard group="Colors" viewport="700x180" name="Warm ink — text scale" subtitle="brown-charcoal text, never pure grey" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-base); padding: 22px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 64px; border-radius: var(--radius-md); display: flex; align-items: flex-end; padding: 7px; }
  .Aa { font-family: var(--font-serif-display); font-size: 22px; line-height: 1; }
  .meta { font-family: var(--font-mono); font-size: 11px; line-height: 1.5; }
  .name { color: var(--text-strong); font-weight: 600; }
  .role { color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-900)"><span class="Aa" style="color:var(--cream-50)">Aa</span></div><div class="meta"><div class="name">ink-900</div><div class="role">strong</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"><span class="Aa" style="color:var(--cream-50)">Aa</span></div><div class="meta"><div class="name">ink-700</div><div class="role">body</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-500)"><span class="Aa" style="color:var(--cream-50)">Aa</span></div><div class="meta"><div class="name">ink-500</div><div class="role">muted</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-400)"><span class="Aa" style="color:var(--cream-50)">Aa</span></div><div class="meta"><div class="name">ink-400</div><div class="role">faint</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-300)"><span class="Aa" style="color:var(--ink-900)">Aa</span></div><div class="meta"><div class="name">ink-300</div><div class="role">line</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-200)"><span class="Aa" style="color:var(--ink-900)">Aa</span></div><div class="meta"><div class="name">ink-200</div><div class="role">hairline</div></div></div>
  </div>
</body>
</html>
