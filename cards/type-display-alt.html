<!-- @dsCard group="Type" viewport="700x210" name="Alt display — Urbanist heavy" subtitle="geometric 'engineer' voice + mono body" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-base); padding: 26px; }
  .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px; }
  .big { font-family: var(--font-geo-display); font-weight: 900; font-size: 50px; line-height: 0.98; letter-spacing: -0.02em; color: var(--text-strong); margin: 0; text-transform: lowercase; }
  .big span { color: var(--spark-deep); }
  .body { margin-top: 16px; font-family: var(--font-mono); font-size: 13px; line-height: 1.7; color: var(--text-muted); max-width: 54ch; }
  .note { margin-top: 14px; font-family: var(--font-sans); font-size: 12px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="eyebrow">urbanist 900 · geometric alt</div>
  <h2 class="big">find the <span>edge</span>. ship the proof.</h2>
  <p class="body">// the heavier, blockier voice. pair urbanist 800/900 titles with mono body for the engineering side of the brand.</p>
  <p class="note">use instead of the serif when a page should read as a tool, not an essay.</p>
</body>
</html>
