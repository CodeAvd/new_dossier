<!-- @dsCard group="Colors" viewport="700x200" name="Spark — vivid cyan pop" subtitle="the one cool accent, complement to terracotta" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-base); padding: 22px; font-family: var(--font-sans); }
  .top { display: flex; gap: 14px; align-items: stretch; margin-bottom: 16px; }
  .pair { flex: 1; display: flex; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); height: 78px; }
  .pair > div { flex: 1; display: grid; place-items: center; font-family: var(--font-mono); font-size: 11px; }
  .warm { background: var(--terra-500); color: var(--text-on-accent); }
  .cool { background: var(--spark); color: var(--spark-on); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .chip { height: 46px; border-radius: var(--radius-md); border: 1px solid var(--border-soft); }
  .meta { font-family: var(--font-mono); font-size: 10.5px; }
  .name { color: var(--text-strong); font-weight: 600; }
  .hex { color: var(--text-muted); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="top">
    <div class="pair"><div class="warm">terracotta</div><div class="cool">spark · #34bfff</div></div>
  </div>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--spark-tint)"></div><div class="meta"><div class="name">tint</div><div class="hex">#eaf8ff</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--spark-soft)"></div><div class="meta"><div class="name">soft</div><div class="hex">#d8f2ff</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--spark)"></div><div class="meta"><div class="name">spark</div><div class="hex">#34bfff</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--spark-deep)"></div><div class="meta"><div class="name">deep</div><div class="hex">#0086bb</div></div></div>
  </div>
</body>
</html>
