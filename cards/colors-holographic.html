<!-- @dsCard group="Colors" viewport="700x190" name="Holographic — deep blue" subtitle="quant / data panels + dramatic dark surfaces" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-base); padding: 22px; }
  .demo { background: var(--holo-800); border-radius: var(--radius-lg); padding: 18px 20px; margin-bottom: 14px; box-shadow: var(--shadow-md); display:flex; align-items:center; justify-content:space-between; }
  .demo h4 { font-family: var(--font-serif-display); font-style: italic; color: var(--holo-text); font-size: 22px; font-weight: 500; margin: 0; }
  .demo .v { font-family: var(--font-serif-display); font-size: 30px; color: #fff; }
  .demo .v em { font-style: italic; color: var(--spark); font-size: 0.55em; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .chip { height: 42px; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.12); }
  .meta { font-family: var(--font-mono); font-size: 10px; }
  .name { color: var(--text-strong); font-weight: 600; }
  .hex { color: var(--text-muted); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="demo">
    <h4>edgefinder · live book</h4>
    <div class="v">+1.8<em> sharpe</em></div>
  </div>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--holo-900)"></div><div class="meta"><div class="name">900</div><div class="hex">#0c1530</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--holo-800)"></div><div class="meta"><div class="name">800</div><div class="hex">#152242</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--holo-700)"></div><div class="meta"><div class="name">700</div><div class="hex">#002474</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--holo-500)"></div><div class="meta"><div class="name">500</div><div class="hex">#234ba2</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--holo-text)"></div><div class="meta"><div class="name">text</div><div class="hex">#e1f5ff</div></div></div>
  </div>
</body>
</html>
