<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>html,body{margin:0;background:#f1e5d5;height:100%}#c{width:100vw;height:100vh;display:block}</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true, preserveDrawingBuffer:true});
renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);
const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(50, canvas.clientWidth/canvas.clientHeight, 0.1, 100);
cam.position.set(0,8,18); cam.lookAt(0,0,0);

const N=60, span=24;
const pos = new Float32Array(N*N*3), col = new Float32Array(N*N*3);
let i=0;
for(let r=0;r<N;r++)for(let c=0;c<N;c++){
  const x=(c/(N-1)-0.5)*span, z=(r/(N-1)-0.5)*span;
  pos[i*3]=x; pos[i*3+1]=Math.sin(x*0.4)+Math.cos(z*0.4); pos[i*3+2]=z;
  col[i*3]=0.2; col[i*3+1]=0.75; col[i*3+2]=1.0; i++;
}
const g=new THREE.BufferGeometry();
g.setAttribute('position', new THREE.BufferAttribute(pos,3));
g.setAttribute('color', new THREE.BufferAttribute(col,3));
const m=new THREE.PointsMaterial({size:0.4, vertexColors:true});
scene.add(new THREE.Points(g,m));
renderer.render(scene,cam);

// readback
requestAnimationFrame(()=>{
  renderer.render(scene,cam);
  const gl=renderer.getContext();
  const p=new Uint8Array(4*100);
  gl.readPixels((gl.drawingBufferWidth*0.5)|0,(gl.drawingBufferHeight*0.5)|0,10,10,gl.RGBA,gl.UNSIGNED_BYTE,p);
  let nz=0; for(let k=0;k<p.length;k+=4) if(p[k+3]) nz++;
  window.__test={nz, buf:[gl.drawingBufferWidth,gl.drawingBufferHeight], rev:THREE.REVISION};
});
</script>
</body>
</html>
