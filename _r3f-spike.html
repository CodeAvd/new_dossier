<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>R3F feasibility spike — THROWAWAY</title>
<style>
  html, body { margin: 0; height: 100%; background: #07070b; color: #e7e7ee;
    font: 13px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
  #stage { position: fixed; inset: 0; }
  #stage canvas { display: block; }
  #panel { position: fixed; top: 12px; left: 12px; z-index: 10; width: 360px;
    background: rgba(10,10,16,.82); border: 1px solid #23232e; border-radius: 10px;
    padding: 14px 16px; backdrop-filter: blur(8px); }
  #panel h1 { font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
    margin: 0 0 10px; color: #e8703a; }
  .row { display: flex; justify-content: space-between; gap: 12px; padding: 2px 0;
    border-bottom: 1px dotted #20202a; }
  .row span:last-child { color: #9fe0a8; text-align: right; }
  .k { color: #8a8a98; }
  #verdict { margin-top: 12px; padding: 8px 10px; border-radius: 8px; font-weight: 700;
    letter-spacing: .04em; text-align: center; background: #1a1a22; }
  #verdict.green { background: #133318; color: #6ee787; }
  #verdict.red { background: #34141a; color: #ff8a9a; }
  #errs { margin-top: 10px; max-height: 160px; overflow: auto; color: #ff8a9a;
    white-space: pre-wrap; font-size: 11px; }
</style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom": "https://esm.sh/react-dom@18.3.1?deps=react@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?deps=react@18.3.1",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "three": "https://esm.sh/three@0.160.1",
    "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.17.10?external=react,react-dom,three",
    "@react-three/drei": "https://esm.sh/@react-three/drei@9.114.0?external=react,react-dom,three,@react-three/fiber",
    "@react-three/postprocessing": "https://esm.sh/@react-three/postprocessing@2.16.3?external=react,three,@react-three/fiber",
    "postprocessing": "https://esm.sh/postprocessing@6.36.4?external=three"
  }
}
</script>
<script>
  // --- result collector + console/error capture (runs before modules) ---
  window.__spike = {
    react: null, threeRevision: null, created: false, rendered: false,
    pixelCheck: null, errors: [], warnings: [],
    pinned: {
      react: "18.3.1",
      "@react-three/fiber": "8.17.10",
      "@react-three/drei": "9.114.0",
      "@react-three/postprocessing": "2.16.3",
      three: "0.160.1",
      postprocessing: "6.36.4"
    }
  };
  const _err = console.error.bind(console);
  console.error = function (...a) {
    try { window.__spike.errors.push(a.map(String).join(" ")); } catch (e) {}
    _err(...a);
  };
  const _warn = console.warn.bind(console);
  console.warn = function (...a) {
    try { window.__spike.warnings.push(a.map(String).join(" ")); } catch (e) {}
    _warn(...a);
  };
  window.addEventListener("error", (e) => {
    window.__spike.errors.push("window.error: " + (e.message || e.error));
  });
  window.addEventListener("unhandledrejection", (e) => {
    window.__spike.errors.push("unhandledrejection: " + (e.reason && e.reason.message || e.reason));
  });
</script>
</head>
<body>
<div id="stage"></div>
<div id="panel">
  <h1>R3F Feasibility Spike</h1>
  <div class="row"><span class="k">react</span><span id="r-react">…</span></div>
  <div class="row"><span class="k">three REVISION</span><span id="r-three">…</span></div>
  <div class="row"><span class="k">fiber (pinned)</span><span>8.17.10</span></div>
  <div class="row"><span class="k">drei (pinned)</span><span>9.114.0</span></div>
  <div class="row"><span class="k">postpro (pinned)</span><span>2.16.3</span></div>
  <div class="row"><span class="k">Canvas created</span><span id="r-created">…</span></div>
  <div class="row"><span class="k">pixel readback</span><span id="r-pixel">…</span></div>
  <div class="row"><span class="k">console errors</span><span id="r-errs">…</span></div>
  <div id="verdict">running…</div>
  <div id="errs"></div>
</div>

<script type="module">
  import React, { useRef } from "react";
  import { createRoot } from "react-dom/client";
  import { Canvas, useFrame } from "@react-three/fiber";
  import { OrbitControls } from "@react-three/drei";
  import { EffectComposer, Bloom } from "@react-three/postprocessing";
  import * as THREE from "three";

  const h = React.createElement;
  const S = window.__spike;
  S.react = React.version;
  S.threeRevision = THREE.REVISION;

  function SpinningMesh() {
    const ref = useRef();
    useFrame((_, dt) => {
      if (ref.current) {
        ref.current.rotation.x += dt * 0.6;
        ref.current.rotation.y += dt * 0.9;
      }
    });
    return h(
      "mesh",
      { ref },
      h("icosahedronGeometry", { args: [1.25, 0] }),
      h("meshStandardMaterial", {
        color: "#e8703a", emissive: "#e8703a", emissiveIntensity: 1.5,
        roughness: 0.3, metalness: 0.15
      })
    );
  }

  function App() {
    return h(
      Canvas,
      {
        gl: { preserveDrawingBuffer: true, antialias: true },
        camera: { position: [0, 0, 4], fov: 50 },
        onCreated: (state) => {
          window.__r3f = state;
          S.created = true;
          S.threeRevision = THREE.REVISION;
        }
      },
      h("color", { attach: "background", args: ["#0b0b12"] }),
      h("ambientLight", { intensity: 0.5 }),
      h("pointLight", { position: [5, 5, 5], intensity: 40 }),
      h(SpinningMesh, null),
      h(OrbitControls, { enableDamping: true }),
      h(
        EffectComposer,
        null,
        h(Bloom, { intensity: 1.3, luminanceThreshold: 0.15, mipmapBlur: true })
      )
    );
  }

  try {
    createRoot(document.getElementById("stage")).render(h(App, null));
    S.rendered = true;
  } catch (e) {
    S.errors.push("render throw: " + (e && e.message));
  }

  // --- live panel + pixel verification ---
  function paintPanel() {
    document.getElementById("r-react").textContent = S.react || "—";
    document.getElementById("r-three").textContent = S.threeRevision || "—";
    document.getElementById("r-created").textContent = S.created ? "yes" : "no";
    document.getElementById("r-errs").textContent = String(S.errors.length);
    if (S.pixelCheck) document.getElementById("r-pixel").textContent = S.pixelCheck.ok ? "non-blank ✓" : "BLANK ✗";
    document.getElementById("errs").textContent = S.errors.join("\n");
    const v = document.getElementById("verdict");
    if (S.pixelCheck) {
      const green = S.pixelCheck.ok && S.errors.length === 0;
      v.className = green ? "green" : "red";
      v.textContent = green ? "GREEN — viable" : "RED — see errors";
    }
  }

  // real pixel capture: draw the live WebGL canvas onto a 2D canvas and read center
  function pixelProbe() {
    const cvs = document.querySelector("#stage canvas");
    if (!cvs) { S.pixelCheck = { ok: false, reason: "no canvas element" }; return; }
    try {
      const w = cvs.width, hh = cvs.height;
      const off = document.createElement("canvas");
      off.width = w; off.height = hh;
      const ctx = off.getContext("2d");
      ctx.drawImage(cvs, 0, 0);
      const cw = Math.floor(w * 0.4), ch = Math.floor(hh * 0.4);
      const data = ctx.getImageData(Math.floor((w - cw) / 2), Math.floor((hh - ch) / 2), cw, ch).data;
      // background is #0b0b12 (≈ r11 g11 b18). Count pixels that clearly differ.
      let lit = 0, total = cw * ch;
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i + 1], b = data[i + 2];
        if (r > 40 || g > 40 || b > 40) lit++;
      }
      const frac = lit / total;
      S.pixelCheck = { ok: frac > 0.02, litFraction: +frac.toFixed(4), sampled: total, w, hh };
    } catch (e) {
      S.pixelCheck = { ok: false, reason: "readback throw: " + (e && e.message) };
    }
  }

  let ticks = 0;
  const iv = setInterval(() => {
    ticks++;
    paintPanel();
    if (ticks >= 8) { pixelProbe(); paintPanel(); clearInterval(iv); S.done = true; }
  }, 250);
</script>
</body>
</html>
